<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help Center - WinJob</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-blue: #0d6efd;
      --secondary-blue: #0b5ed7;
      --accent-orange: #ff6b00;
      --light-bg: #f8f9fa;
      --card-white: #ffffff;
      --text-dark: #1a1a1a;
      --text-muted: #6c757d;
      --border-light: #e9ecef;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      color: var(--text-dark);
      background-color: #f0f2f5;
      line-height: 1.6;
    }
    
    /* ======================== HERO SECTION ======================== */
    .hero-section {
      background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);
      color: white;
      padding: 60px 20px;
      text-align: center;
      margin-bottom: 50px;
    }
    
    .hero-title {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 15px;
      letter-spacing: -0.5px;
    }
    
    .hero-subtitle {
      font-size: 1.1rem;
      font-weight: 300;
      opacity: 0.95;
    }
    
    /* ======================== MAIN CONTAINER ======================== */
    .help-center-container {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 30px;
      padding: 0 20px;
      max-width: 1400px;
      margin: 0 auto 60px;
    }
    
    /* ======================== LEFT COLUMN - SUPPORT CARDS ======================== */
    .support-sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: fit-content;
      position: sticky;
      top: 100px;
    }
    
    .support-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }
    
    .support-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.12);
      background: rgba(255, 255, 255, 1);
    }
    
    .support-icon {
      font-size: 2.2rem;
      color: var(--accent-orange);
      margin-bottom: 16px;
      display: block;
    }
    
    .support-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 12px;
    }
    
    .support-contact {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--primary-blue);
      margin-bottom: 8px;
      word-break: break-word;
    }
    
    .support-time {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 400;
    }
    
    /* ======================== RIGHT COLUMN - GUIDED WORKFLOW ======================== */
    .issue-resolution-panel {
      background: var(--card-white);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }
    
    .panel-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 8px;
    }
    
    .panel-subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    
    /* ======================== STEP 1: CATEGORY GRID ======================== */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    
    .category-card {
      background: var(--light-bg);
      border: 2px solid transparent;
      border-radius: 18px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .category-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(13, 110, 253, 0.05), rgba(11, 94, 215, 0.05));
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    
    .category-card:hover {
      border-color: var(--primary-blue);
      box-shadow: 0 8px 20px rgba(13, 110, 253, 0.12);
      transform: translateY(-4px);
    }
    
    .category-card:hover::before {
      opacity: 1;
    }
    
    .category-card.active {
      background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
      border-color: var(--primary-blue);
      color: white;
      box-shadow: 0 12px 28px rgba(13, 110, 253, 0.25);
    }
    
    .category-icon {
      font-size: 1.8rem;
      margin-bottom: 12px;
      color: var(--accent-orange);
      display: block;
    }
    
    .category-card.active .category-icon {
      color: white;
    }
    
    .category-name {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text-dark);
    }
    
    .category-card.active .category-name {
      color: white;
    }
    
    /* ======================== STEP 2: SUB-ISSUES ======================== */
    .sub-issues-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 28px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .sub-issues-container.show {
      max-height: 500px;
      opacity: 1;
    }
    
    .sub-issue-btn {
      background: white;
      border: 1.5px solid var(--border-light);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-dark);
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    
    .sub-issue-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(13, 110, 253, 0.08), transparent);
      transition: left 0.5s ease;
    }
    
    .sub-issue-btn:hover::before {
      left: 100%;
    }
    
    .sub-issue-btn:hover {
      border-color: var(--primary-blue);
      background: rgba(13, 110, 253, 0.04);
      transform: translateX(4px);
    }
    
    .sub-issue-btn.active {
      background: linear-gradient(135deg, rgba(13, 110, 253, 0.1), rgba(11, 94, 215, 0.05));
      border-color: var(--primary-blue);
      color: var(--primary-blue);
      font-weight: 600;
    }
    
    /* ======================== STEP 3: SOLUTION BOX ======================== */
    .solution-container {
      margin-bottom: 0;
    }
    
    .solution-box {
      background: white;
      border-radius: 16px;
      border-left: 5px solid var(--primary-blue);
      padding: 28px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .solution-box.show {
      max-height: 1200px;
      opacity: 1;
    }
    
    .solution-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .solution-title-icon {
      font-size: 1.4rem;
      color: var(--accent-orange);
    }
    
    .solution-steps {
      margin-bottom: 20px;
    }
    
    .solution-step {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border-light);
    }
    
    .solution-step:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    
    .step-number {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    
    .step-content {
      flex: 1;
      padding-top: 2px;
    }
    
    .step-text {
      font-size: 0.95rem;
      color: var(--text-dark);
      line-height: 1.6;
    }
    
    .solution-action-btn {
      background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
      display: inline-block;
    }
    
    .solution-action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(13, 110, 253, 0.3);
      color: white;
      text-decoration: none;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    
    .empty-state-icon {
      font-size: 3.5rem;
      color: var(--accent-orange);
      margin-bottom: 16px;
      opacity: 0.6;
    }
    
    /* ======================== RESPONSIVE ======================== */
    @media (max-width: 1024px) {
      .help-center-container {
        grid-template-columns: 1fr;
        gap: 40px;
      }
      
      .support-sidebar {
        position: static;
        grid-template-columns: repeat(2, 1fr);
        display: grid;
        gap: 16px;
      }
      
      .support-card {
        padding: 24px 20px;
      }
      
      .category-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (max-width: 768px) {
      .hero-title {
        font-size: 2rem;
      }
      
      .help-center-container {
        padding: 0 15px;
        margin-bottom: 40px;
      }
      
      .issue-resolution-panel {
        padding: 24px;
      }
      
      .support-sidebar {
        grid-template-columns: 1fr;
      }
      
      .category-grid {
        grid-template-columns: 1fr;
      }
      
      .sub-issues-container {
        grid-template-columns: 1fr;
      }
      
      .panel-title {
        font-size: 1.2rem;
      }
      
      .solution-box {
        padding: 20px;
      }
    }
    
    /* ======================== ANIMATIONS ======================== */
    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    
    .category-card {
      animation: slideInUp 0.5s ease-out forwards;
    }
    
    .category-card:nth-child(1) { animation-delay: 0.1s; }
    .category-card:nth-child(2) { animation-delay: 0.2s; }
    .category-card:nth-child(3) { animation-delay: 0.3s; }
    .category-card:nth-child(4) { animation-delay: 0.4s; }
    .category-card:nth-child(5) { animation-delay: 0.5s; }
    .category-card:nth-child(6) { animation-delay: 0.6s; }
    .category-card:nth-child(7) { animation-delay: 0.7s; }
    .category-card:nth-child(8) { animation-delay: 0.8s; }
    .category-card:nth-child(9) { animation-delay: 0.9s; }
  </style>
</head>

  <!-- Main Help Center -->

      <!-- Sub-Issues Container -->
      <div class="sub-issues-container" id="subIssuesContainer">

      <!-- Solution Box -->

          <i class="fas fa-lightbulb"></i>

    // ======================== DOM ELEMENTS ========================
    const categoryGrid = document.getElementById('categoryGrid');
    const subIssuesContainer = document.getElementById('subIssuesContainer');
    const solutionBox = document.getElementById('solutionBox');
    const emptyState = document.getElementById('emptyState');

    let selectedCategory = null;
    let selectedIssue = null;

    // ======================== RENDER CATEGORIES ========================
    function renderCategories() {
      categoryGrid.innerHTML = '';
      issueCategories.forEach((category, index) => {
        const card = document.createElement('div');
        card.className = 'category-card';
        card.innerHTML = `
          <i class="category-icon ${category.icon}"></i>
          <div class="category-name">${category.name}</div>
        `;
        card.addEventListener('click', () => selectCategory(category, card));
        categoryGrid.appendChild(card);
      });
    }

    // ======================== SELECT CATEGORY ========================
    function selectCategory(category, element) {
      // Remove active from all
      document.querySelectorAll('.category-card').forEach(card => {
        card.classList.remove('active');
      });
      element.classList.add('active');

      selectedCategory = category;
      selectedIssue = null;

      // Render sub-issues
      renderSubIssues(category.issues);

      // Hide solution
      solutionBox.classList.remove('show');
      emptyState.style.display = 'block';
    }

    // ======================== RENDER SUB-ISSUES ========================
    function renderSubIssues(issues) {
      subIssuesContainer.innerHTML = '';
      subIssuesContainer.classList.add('show');

      issues.forEach(issue => {
        const btn = document.createElement('button');
        btn.className = 'sub-issue-btn';
        btn.innerHTML = `<i class="${issue.icon}" style="margin-right: 8px; color: var(--accent-orange);"></i>${issue.title}`;
        btn.addEventListener('click', () => selectIssue(issue, btn));
        subIssuesContainer.appendChild(btn);
      });
    }

    // ======================== SELECT ISSUE ========================
    function selectIssue(issue, element) {
      // Remove active from all sub-issues
      document.querySelectorAll('.sub-issue-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      element.classList.add('active');

      selectedIssue = issue;

      // Show solution
      renderSolution(issue);
    }

    // ======================== RENDER SOLUTION ========================
    function renderSolution(issue) {
      let stepsHTML = '';
      issue.steps.forEach((step, index) => {
        stepsHTML += `
          <div class="solution-step">
            <div class="step-number">${index + 1}</div>
            <div class="step-content">
              <p class="step-text">${step}</p>
            </div>
          </div>
        `;
      });

      let actionHTML = '';
      if (issue.action) {
        actionHTML = `<a href="${issue.action.link}" class="solution-action-btn">${issue.action.text}</a>`;
      }

      solutionBox.innerHTML = `
        <div class="solution-title">
          <span class="solution-title-icon"><i class="${issue.icon}"></i></span>
          ${issue.title}
        </div>
        <div class="solution-steps">${stepsHTML}</div>
        ${actionHTML}
      `;

      solutionBox.classList.add('show');
      emptyState.style.display = 'none';
    }

    // ======================== INITIALIZE ========================
    document.addEventListener('DOMContentLoaded', () => {
      renderCategories();

      // Load navbar
      const navbarContainer = document.getElementById('navbar-container');
      fetch('navbar.html')
        .then(res => res.ok ? res.text() : null)
        .then(html => {
          if (html) {
            navbarContainer.innerHTML = html;
            if (typeof loadNavbarProfile === 'function') {
              loadNavbarProfile();
            } else {
              loadProfileIcon();
            }
          }
        })
        .catch(err => console.error('Navbar load error:', err));
    });

    // Simple profile loader
    function loadProfileIcon() {
      const email = sessionStorage.getItem('email');
      if (!email) return;

      fetch(`/api/profile/full?email=${encodeURIComponent(email)}`)
        .then(res => res.ok ? res.json() : null)
        .then(data => {
          if (data?.personalDetails?.profilePhoto) {
            const avatar = document.getElementById('profile-avatar');
            if (avatar) {
              avatar.src = data.personalDetails.profilePhoto;
              const profileIcon = document.getElementById('profile-icon');
              if (profileIcon) profileIcon.classList.add('d-none');
            }
          }
        })
        .catch(err => console.error('Profile load error:', err));
    }
  </script>
