<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Mentors - WinJob Mentorship</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="scripts/auth.js"></script>
  <style>
    :root {
      --primary-color: #6a0dad;
      --primary: #6a0dad;
      --primary-dark: #5a0a9d;
      --primary-light: #8a2be2;
      --secondary: #d653c9;
      --secondary-color: #d653c9;
      --secondary-dark: #c641b9;
      --accent-color: #ff6b00;
      --success: #059669;
      --danger: #dc2626;
      --light-bg: #f9f7ff;
      --bg-subtle: #f9f7ff;
      --card-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      --card-shadow-hover: 0 15px 30px rgba(0, 0, 0, 0.1);
      --border-color: #e5e7eb;
      --text-primary: #333333;
      --text-secondary: #6c757d;
      --text-tertiary: #9ca3af;
    }

    * {
      font-family: 'Poppins', sans-serif;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: white;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* ==========================================
       NAVBAR
       ========================================== */
    .navbar {
      background: white;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      transition: all 0.3s ease;
    }

    .navbar.scrolled {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 12px 0;
    }

    .navbar-brand {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.3s ease;
    }

    .navbar-brand:hover {
      transform: scale(1.05);
    }

    .navbar-brand i {
      font-size: 1.4rem;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .navbar-nav .nav-link {
      color: var(--text-secondary) !important;
      font-weight: 500;
      transition: all 0.3s ease;
      margin-left: 8px;
    }

    .navbar-nav .nav-link:hover {
      color: var(--primary-color) !important;
    }




    /* ==========================================
       HERO SECTION
       ========================================== */
    .hero-section {
      background: linear-gradient(135deg, #6a0dad 0%, #d653c9 100%);
      color: white;
      padding: 80px 20px 100px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.8s ease;
    }

    .hero-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      opacity: 0.95;
      margin-bottom: 40px;
      font-weight: 500;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-cta {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeIn 1s ease 0.3s both;
    }

    .btn-primary-hero {
      padding: 12px 30px;
      background: white;
      color: #6a0dad;
      border: none;
      border-radius: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1rem;
      box-shadow: 0 10px 30px rgba(106, 13, 173, 0.2);
    }

    .btn-primary-hero:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(106, 13, 173, 0.25);
    }

    .btn-outline-hero {
      padding: 12px 30px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn-outline-hero:hover {
      background: white;
      color: #6a0dad;
      border-color: white;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    /* ==========================================
       FILTERS SECTION
       ========================================== */
    .filters-section {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: var(--card-shadow);
      margin-bottom: 50px;
      border: 1px solid rgba(106, 13, 173, 0.1);
      animation: slideInDown 0.6s ease;
    }

    .filters-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .filters-title i {
      color: var(--primary-color);
    }

    .filter-group {
      margin-bottom: 0;
    }

    .filter-label {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      display: block;
      font-size: 0.95rem;
    }

    .form-control, .form-select {
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 10px 14px;
      transition: all 0.3s ease;
      font-size: 0.95rem;
      color: var(--text-primary);
      background-color: white;
    }

    .form-control::placeholder {
      color: var(--text-tertiary);
    }

    .form-control:focus, .form-select:focus {
      border-color: #6a0dad;
      box-shadow: 0 0 0 3px rgba(106, 13, 173, 0.1);
      outline: none;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .filter-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-filter, .btn-reset {
      padding: 11px 26px;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-filter {
      background: linear-gradient(135deg, #6a0dad 0%, #d653c9 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(106, 13, 173, 0.25);
    }

    .btn-filter:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(106, 13, 173, 0.35);
    }

    .btn-reset {
      background: var(--light-bg);
      color: var(--text-secondary);
      border: 2px solid rgba(106, 13, 173, 0.2);
    }

    .btn-reset:hover {
      background: rgba(106, 13, 173, 0.05);
      border-color: var(--primary-color);
      color: var(--primary-color);
    }

    /* ==========================================
       FEATURED SECTION
       ========================================== */
    .featured-section {
      padding: 20px 0;
      margin-bottom: 30px;
      text-align: center;
      position: relative;
    }


    .featured-title {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 35px;
      position: relative;
      z-index: 1;
      color: var(--text-primary);
    }

    .featured-mentors {
      display: flex;
      justify-content: flex-start;
      gap: 25px;
      overflow-x: auto;
      padding: 10px 5px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
      position: relative;
      z-index: 1;
    }
    .featured-mentors::-webkit-scrollbar {
      display: none;
    }

    .featured-mentor {
      background: linear-gradient(40deg, #adbeeb, #56538700);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      padding: 25px 20px;
      border-radius: 14px;
      text-align: center;
      transition: all 0.3s ease;
      width: 280px;
      flex: 0 0 280px;
      scroll-snap-align: start;
    }

    .featured-mentor:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-5px);
    }

    .featured-mentor-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      margin: 0 auto 15px;
      border: 3px solid white;
      object-fit: cover;
    }

    .featured-mentor-name {
      font-weight: 700;
      margin-bottom: 5px;
      font-size: 1.05rem;
      color: var(--text-primary);
    }

    .featured-mentor-title {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .featured-mentor-rate {
      background: rgba(106, 13, 173, 0.1);
      color: var(--primary-color);
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      display: inline-block;
    }

    /* ==========================================
       MENTORS SECTION
       ========================================== */
    .mentors-section {
      margin-bottom: 50px;
    }

    .section-title {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 20px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title i {
      color: var(--primary-color);
      font-size: 1.6rem;
    }

    .mentors-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .mentor-card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(106, 13, 173, 0.1);
      cursor: pointer;
      height: 100%;
    }

    .mentor-card:hover {
      transform: translateY(-10px);
      box-shadow: var(--card-shadow-hover);
      border-color: #d653c9;
    }

    .mentor-header {
      background: linear-gradient(135deg, #6a0dad 0%, #d653c9 100%);
      height: 130px;
      position: relative;
      overflow: hidden;
    }

    .mentor-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .mentor-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 5px solid white;
      position: absolute;
      bottom: -55px;
      left: 50%;
      transform: translateX(-50%);
      object-fit: cover;
      background: #e2e8f0;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .mentor-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(106, 13, 173, 0.3);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(106, 13, 173, 0.5);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .mentor-body {
      padding: 65px 24px 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .mentor-name {
      font-size: 1.25rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
    }

    .mentor-title {
      color: var(--text-secondary);
      text-align: center;
      font-size: 0.95rem;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .mentor-company {
      color: #6a0dad;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .mentor-stats {
      display: flex;
      justify-content: space-around;
      padding: 18px 0;
      border-top: 2px solid var(--border-color);
      border-bottom: 2px solid var(--border-color);
      margin-bottom: 18px;
      text-align: center;
    }

    .mentor-stat {
      flex: 1;
      transition: all 0.3s ease;
    }

    .mentor-stat-value {
      font-weight: 800;
      font-size: 1.25rem;
      color: #6a0dad;
    }

    .mentor-stat-label {
      font-size: 0.8rem;
      color: var(--text-tertiary);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .mentor-expertise {
      margin-bottom: 18px;
      flex-grow: 1;
      min-height: 70px;
    }

    .expertise-tag {
      display: inline-block;
      background: #f9f7ff;
      color: #6a0dad;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 0.8rem;
      margin-right: 6px;
      margin-bottom: 6px;
      font-weight: 600;
      border: 1px solid rgba(106, 13, 173, 0.2);
      transition: all 0.3s ease;
    }

    .expertise-tag:hover {
      background: #6a0dad;
      color: white;
      border-color: #6a0dad;
    }

    .mentor-pricing {
      display: flex;
      align-items: baseline;
      justify-content: center;
      margin-bottom: 18px;
      gap: 6px;
      background: #f9f7ff;
      padding: 12px;
      border-radius: 15px;
    }

    .mentor-price {
      font-size: 1.8rem;
      font-weight: 800;
      color: #6a0dad;
    }

    .mentor-price-label {
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 600;
    }

    .mentor-bio {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 18px;
      line-height: 1.6;
      flex-grow: 1;
    }

    .mentor-actions {
      display: flex;
      gap: 12px;
    }

    .btn-book, .btn-chat {
      flex: 1;
      padding: 11px 16px;
      border: none;
      border-radius: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-book {
      background: linear-gradient(135deg, #6a0dad 0%, #d653c9 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(106, 13, 173, 0.2);
    }

    .btn-book:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(106, 13, 173, 0.3);
    }

    .btn-chat {
      background: var(--light-bg);
      color: var(--text-secondary);
      border: 2px solid rgba(106, 13, 173, 0.2);
    }

    .btn-chat:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
      background: white;
    }

    /* ==========================================
       PAGINATION
       ========================================== */
    .pagination-section {
      text-align: center;
      margin: 50px 0;
    }

    .pagination {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pagination a, .pagination span {
      padding: 10px 14px;
      border: 2px solid #d653c9;
      border-radius: 10px;
      text-decoration: none;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 700;
      min-width: 44px;
      text-align: center;
    }

    .pagination a:hover {
      border-color: #6a0dad;
      color: #6a0dad;
      background: #f9f7ff;
    }

    .pagination .active {
      background: linear-gradient(135deg, #6a0dad 0%, #d653c9 100%);
      border-color: transparent;
      color: white;
    }

    /* ==========================================
       EMPTY STATE
       ========================================== */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-tertiary);
    }

    .empty-state i {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.4;
      color: var(--primary);
    }

    .empty-state h3 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: var(--text-secondary);
    }

    .empty-state p {
      font-size: 1rem;
    }

    /* ==========================================
       LOADING
       ========================================== */
    .loading {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .loading i {
      font-size: 2.5rem;
      color: var(--primary);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ==========================================
       SCROLL TO TOP BUTTON
       ========================================== */
    .scroll-top-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6a0dad 0%, #d653c9 100%);
      color: white;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(106, 13, 173, 0.35);
      display: none;
      z-index: 9999;
      transition: all 0.3s ease;
      border: none;
    }

    .scroll-top-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(106, 13, 173, 0.45);
    }

    /* ==========================================
       RESPONSIVE DESIGN
       ========================================== */
    @media (max-width: 1200px) {
      .mentors-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .filters-grid {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }
    }

    @media (max-width: 768px) {
      .hero-title {
        font-size: 2rem;
      }

      .hero-subtitle {
        font-size: 1rem;
      }

      .hero-section {
        padding: 60px 20px 80px;
      }

      .filters-section {
        padding: 24px 20px;
      }

      .filters-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .filter-actions {
        flex-direction: column;
        gap: 10px;
      }

      .btn-filter, .btn-reset {
        width: 100%;
        justify-content: center;
      }

      .mentors-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .mentor-actions {
        flex-direction: column;
      }

      .mentor-actions button {
        width: 100%;
      }

      .section-title {
        font-size: 1.4rem;
      }

      .featured-title {
        font-size: 1.5rem;
      }

      .featured-mentors {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
      }

      .navbar-brand {
        font-size: 1.2rem;
      }

      .scroll-top-btn {
        bottom: 20px;
        right: 20px;
        width: 45px;
        height: 45px;
        font-size: 16px;
      }

      .hero-cta {
        gap: 10px;
      }

      .btn-primary-hero {
        padding: 10px 24px;
        font-size: 0.9rem;
      }

      .footer-bottom {
        flex-direction: column;
        text-align: center;
      }

      .footer-badges {
        justify-content: center;
      }

      .stats-grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }
    }

    @media (max-width: 480px) {
      .hero-section {
        padding: 50px 16px 70px;
      }

      .hero-title {
        font-size: 1.5rem;
        margin-bottom: 15px;
      }

      .hero-subtitle {
        font-size: 0.95rem;
        margin-bottom: 30px;
      }

      .filters-section {
        padding: 20px 16px;
        margin-bottom: 30px;
      }

      .filters-title {
        font-size: 1.1rem;
        margin-bottom: 20px;
      }

      .mentors-grid {
        gap: 16px;
      }

      .mentor-card {
        border-radius: 12px;
      }

      .mentor-body {
        padding: 60px 16px 16px;
      }

      .mentor-name {
        font-size: 1.1rem;
      }

      .mentor-avatar {
        width: 90px;
        height: 90px;
        bottom: -45px;
      }

      .featured-section {
        padding: 40px 20px;
      }

      .featured-title {
        font-size: 1.3rem;
      }

      .featured-mentors {
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      }

      .section-title {
        font-size: 1.2rem;
        margin-bottom: 25px;
      }

      .pagination a, .pagination span {
        padding: 8px 10px;
        font-size: 0.85rem;
        min-width: 36px;
      }

      .container-lg {
        padding-left: 12px;

  <script>
    // ==========================================
    // Global State
    // ==========================================
    let currentPage = 1;
    const mentorsPerPage = 9;
    let allMentors = [];
    let filteredMentors = [];

    // ==========================================
    // Load Mentors on Page Load
    // ==========================================
    // ==========================================
    // Lazy Load Images
    // ==========================================
    function setupLazyLoading() {
      if ('IntersectionObserver' in window) {
        const imageObserver = new IntersectionObserver((entries, observer) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              img.src = img.dataset.src;
              img.classList.add('loaded');
              observer.unobserve(img);
            }
          });
        });

        document.querySelectorAll('img[data-src]').forEach(img => {
          imageObserver.observe(img);
        });
      }
    }

    // ==========================================
    // Analytics Tracking (Optional)
    // ==========================================
    function trackPageMetrics() {
      // Track page load time
      if (window.performance) {
        window.addEventListener('load', () => {
          const perfData = window.performance.timing;
          const pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;
          console.log('Page load time:', pageLoadTime + 'ms');
        });
      }
    }

    // ==========================================
    // Accessibility Enhancements
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
      loadMentors();
      setupScrollEffects();
      setupLazyLoading();
      trackPageMetrics();
      
      // Keyboard navigation
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          // Close any potential modals
        }
      });
    });

    // ==========================================
    // Setup Scroll Effects
    // ==========================================
    function setupScrollEffects() {
      const navbar = document.querySelector('.navbar');
      const scrollTopBtn = document.getElementById('scrollTopBtn');

      window.addEventListener('scroll', () => {
        // Navbar shadow effect
        if (window.scrollY > 10) {
          navbar.classList.add('scrolled');
        } else {
          navbar.classList.remove('scrolled');
        }

        // Scroll to top button
        if (window.scrollY > 300) {
          scrollTopBtn.style.display = 'flex';
        } else {
          scrollTopBtn.style.display = 'none';
        }
      });

      // Scroll to top functionality
      scrollTopBtn.addEventListener('click', () => {
        window.scrollTo({
          top: 0,
          behavior: 'smooth'
        });
      });
    }

    // ==========================================
    // Toggle Mobile Sidebar
    // ==========================================
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.toggle('active');
      overlay.classList.toggle('active');
      
      // Prevent body scroll when sidebar is open
      if (sidebar.classList.contains('active')) {
        document.body.style.overflow = 'hidden';
      } else {
        document.body.style.overflow = '';
      }
    }

    // ==========================================
    // Show Skeleton Loader
    // ==========================================
    function showSkeleton() {
      const grid = document.getElementById('mentorsGrid');
      grid.innerHTML = Array(10).fill(0).map(() => `
        <div class="skeleton-card"></div>
      `).join('');
    }

    // ==========================================
    // Load Mentors from API
    // ==========================================
    async function loadMentors() {
      try {
        document.getElementById('loading').style.display = 'block';
        showSkeleton();

        // Fetch a larger dataset for client-side sorting/filtering/pagination
        const params = new URLSearchParams({
          page: 1,
          limit: 100, // Fetch top 100 mentors
        });

        const response = await fetch(`/api/mentors/all?${params}`);
        const data = await response.json();

        document.getElementById('loading').style.display = 'none';

        if (data.success) {
          allMentors = data.mentors;
          filteredMentors = [...allMentors];
          
          // Render sections
          renderTopRated(allMentors);
          showFeaturedMentors(allMentors.slice(0, 3));
          
          // Render grid with local pagination
          paginateAndRender();
        }
      } catch (error) {
        console.error('Error loading mentors:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('mentorsGrid').innerHTML = '';
      }
    }

    // ==========================================
    // Render Top Rated Mentors
    // ==========================================
    function renderTopRated(mentors) {
      const section = document.getElementById('topRatedSection');
      const container = document.getElementById('topRatedMentors');

      if (!mentors || mentors.length === 0) {
        section.style.display = 'none';
        return;
      }

      // Sort by rating descending and take top 10
      const top10 = [...mentors]
        .sort((a, b) => (b.rating || 0) - (a.rating || 0))
        .slice(0, 10);

      container.innerHTML = top10.map(mentor => `
        <div class="carousel-item" onclick="showMentorDetails('${mentor.id}')">
          <div class="mentor-card h-100 mb-0">
            <div class="mentor-header">
              <div class="mentor-badge"><i class="fas fa-crown" style="color: #ffb800;"></i> Top Rated</div>
              <img src="${mentor.profile_image_url || 'https://via.placeholder.com/100?text=' + mentor.full_name.charAt(0)}" class="mentor-avatar" alt="${mentor.full_name}">
            </div>
            <div class="mentor-body">
              <div class="mentor-name">${mentor.full_name}</div>
              <div class="mentor-title">${mentor.title || 'Professional'}</div>
              <div class="mentor-stats">
                <div class="mentor-stat">
                  <div class="mentor-stat-value">${Number(mentor.rating || 0).toFixed(1)}</div>
                  <div class="mentor-stat-label">Rating</div>
                </div>
                <div class="mentor-stat">
                  <div class="mentor-stat-value">${mentor.experience_years || 0}y</div>
                  <div class="mentor-stat-label">Exp.</div>
                </div>
              </div>
              <div class="mentor-pricing text-center">
                <span class="mentor-price">₹${mentor.hourly_price || 50}</span>
                <span class="mentor-price-label">/hr</span>
              </div>
            </div>
          </div>
        </div>
      `).join('');

      section.style.display = 'block';
    }

    // ==========================================
    // Scroll Carousel
    // ==========================================
    function scrollCarousel(direction) {
      const container = document.getElementById('topRatedMentors');
      const scrollAmount = 325; // Card width (300) + gap (25)
      container.scrollBy({
        left: direction * scrollAmount,
        behavior: 'smooth'
      });
    }

    function scrollFeatured(direction) {
      const container = document.getElementById('featuredMentors');
      const scrollAmount = 305; // Card width (280) + gap (25)
      container.scrollBy({
        left: direction * scrollAmount,
        behavior: 'smooth'
      });
    }

    // ==========================================
    // Paginate and Render
    // ==========================================
    function paginateAndRender() {
      const startIndex = (currentPage - 1) * mentorsPerPage;
      const endIndex = startIndex + mentorsPerPage;
      const paginatedMentors = filteredMentors.slice(startIndex, endIndex);

      renderMentors(paginatedMentors);
      
      const totalPages = Math.ceil(filteredMentors.length / mentorsPerPage);
      renderPaginationLocal(currentPage, totalPages);
      
      // Update pagination info text
      updatePaginationInfo(startIndex + 1, Math.min(endIndex, filteredMentors.length), filteredMentors.length);
    }

    function updatePaginationInfo(start, end, total) {
        const grid = document.getElementById('mentorsGrid');
        let info = document.getElementById('paginationInfo');
        
        if (!info) {
            info = document.createElement('div');
            info.id = 'paginationInfo';
            info.className = 'pagination-info text-center w-100';
            grid.parentNode.insertBefore(info, document.getElementById('paginationSection'));
        }
        
        if (total === 0) {
            info.style.display = 'none';
        } else {
            info.style.display = 'block';
            info.innerHTML = `Showing <b>${start}-${end}</b> of <b>${total}</b> mentors`;
        }
    }

    // ==========================================
    // Render Mentors
    // ==========================================
    function renderMentors(mentors) {
      const grid = document.getElementById('mentorsGrid');

      if (mentors.length === 0) {
        document.getElementById('emptyState').style.display = 'block';
        grid.innerHTML = '';
        return;
      }

      document.getElementById('emptyState').style.display = 'none';

      grid.innerHTML = mentors.map(mentor => `
        <div class="mentor-card" onclick="showMentorDetails('${mentor.id}')">
          <div class="mentor-header">
            ${mentor.is_verified ? '<div class="mentor-badge"><i class="fas fa-check-circle"></i> Verified</div>' : ''}
            <img src="${mentor.profile_image_url || 'https://via.placeholder.com/100?text=' + mentor.full_name.charAt(0)}" class="mentor-avatar" alt="${mentor.full_name}">
          </div>

          <div class="mentor-body">
            <div class="mentor-name">${mentor.full_name}</div>
            <div class="mentor-title">${mentor.title || 'Professional'}</div>
            
            <div class="mentor-stats">
              <div class="mentor-stat">
                <div class="mentor-stat-value">${Number(mentor.rating || 0).toFixed(1)}★</div>
                <div class="mentor-stat-label">Rating</div>
              </div>
              <div class="mentor-stat">
                <div class="mentor-stat-value">${mentor.experience_years || 0}y+</div>
                <div class="mentor-stat-label">Exp.</div>
              </div>
            </div>

            <div class="mentor-pricing text-center mt-auto">
              <span class="mentor-price">₹${mentor.hourly_price || 50}</span>
              <span class="mentor-price-label">/hour</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ==========================================
    // Show Featured Mentors
    // ==========================================
    function showFeaturedMentors(mentors) {
      const section = document.getElementById('featuredSection');
      const container = document.getElementById('featuredMentors');

      container.innerHTML = mentors.map(mentor => `
        <div class="featured-mentor">
          <img src="${mentor.profile_image_url || 'https://via.placeholder.com/60?text=' + mentor.full_name.charAt(0)}" class="featured-mentor-avatar" alt="${mentor.full_name}">
          <div class="featured-mentor-name">${mentor.full_name}</div>
          <div class="featured-mentor-title">${mentor.title || 'Mentor'}</div>
          <div class="featured-mentor-rate"><i class="fas fa-star"></i> ${Number(mentor.rating || 0).toFixed(1)}</div>
        </div>
      `).join('');

      section.style.display = 'block';
    }

    // ==========================================
    // Apply Filters with Visual Feedback
    // ==========================================
    function applyFilters() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const expertise = document.getElementById('expertiseFilter').value;
      const minRating = parseFloat(document.getElementById('ratingFilter').value) || 0;
      const maxPrice = parseFloat(document.getElementById('priceFilter').value) || Infinity;

      filteredMentors = allMentors.filter(mentor => {
        const matchesSearch = !search || 
          mentor.full_name.toLowerCase().includes(search) ||
          (mentor.expertise && mentor.expertise.some(e => e.toLowerCase().includes(search))) ||
          (mentor.title && mentor.title.toLowerCase().includes(search));
        
        const matchesExpertise = !expertise || (mentor.expertise && mentor.expertise.includes(expertise));
        const matchesRating = (mentor.rating || 0) >= minRating;
        const matchesPrice = (mentor.hourly_price || 0) <= maxPrice;

        return matchesSearch && matchesExpertise && matchesRating && matchesPrice;
      });

      currentPage = 1;
      
      // Visual feedback
      const btnFilter = document.querySelector('.btn-filter');
      const originalHtml = btnFilter.innerHTML;
      btnFilter.innerHTML = '<i class="fas fa-check"></i> Applied';
      btnFilter.style.background = 'var(--success)';
      
      setTimeout(() => {
        btnFilter.innerHTML = originalHtml;
        btnFilter.style.background = '';
      }, 1500);
      
      paginateAndRender();
      
      // Close sidebar on mobile after apply
      if (window.innerWidth <= 992) {
        toggleSidebar();
      }
      
      // Show results count
      showFilterResults(filteredMentors.length);
    }

    // ==========================================
    // Show Filter Results Count
    // ==========================================
    function showFilterResults(count) {
      const title = document.querySelector('.section-title');
      if (title) {
        const originalText = title.innerHTML;
        title.innerHTML = `<i class="fas fa-users"></i> Available Mentors <span style="color: #6a0dad; margin-left: 10px;">(${count} found)</span>`;
        
        // Restore original after 5 seconds if no further actions
        setTimeout(() => {
          if (title.innerHTML.includes('found')) {
            title.innerHTML = originalText;
          }
        }, 5000);
      }
    }
    function resetFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('expertiseFilter').value = '';
      document.getElementById('ratingFilter').value = '';
      document.getElementById('priceFilter').value = '';
      
      filteredMentors = [...allMentors];
      currentPage = 1;
      paginateAndRender();
      
      if (window.innerWidth <= 992) {
        toggleSidebar();
      }
    }

    // ==========================================
    // Render Pagination Local
    // ==========================================
    function renderPaginationLocal(page, totalPages) {
      const section = document.getElementById('paginationSection');
      const container = document.getElementById('pagination');

      if (totalPages <= 1) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';

      let html = '';
      
      if (page > 1) {
        html += `<a onclick="changePage(${page - 1})" title="Previous page"><i class="fas fa-chevron-left"></i></a>`;
      }

      // Show limited page numbers
      const startPage = Math.max(1, page - 2);
      const endPage = Math.min(totalPages, startPage + 4);

      for (let i = startPage; i <= endPage; i++) {
        if (i === page) {
          html += `<span class="active">${i}</span>`;
        } else {
          html += `<a onclick="changePage(${i})" title="Go to page ${i}">${i}</a>`;
        }
      }

      if (page < totalPages) {
        html += `<a onclick="changePage(${page + 1})" title="Next page"><i class="fas fa-chevron-right"></i></a>`;
      }

      container.innerHTML = html;
    }

    function changePage(page) {
      currentPage = page;
      paginateAndRender();
      window.scrollTo({
        top: document.querySelector('.main-layout').offsetTop - 100,
        behavior: 'smooth'
      });
    }

    // ==========================================
    // Book Mentor
    // ==========================================
    async function bookMentor(mentorId, mentorName, price) {
      try {
        if (!Auth.isLoggedIn()) {
          alert('Please login to book a session');
          window.location.href = 'login.html';
          return;
        }

        // Start booking without payment
        const bookingRes = await Auth.fetchWithAuth('/api/mentors/start-booking', {
          method: 'POST',
          body: JSON.stringify({ mentorId })
        });

        const bookingData = await bookingRes.json();
        
        if (!bookingData.success) {
          alert(bookingData.message || 'Failed to create booking');
          return;
        }

        // Redirect to chat with booking context
        window.location.href = `mychat.html?roomId=${bookingData.roomId}&bookingId=${bookingData.bookingId}&mentorId=${mentorId}`;

      } catch (error) {
        console.error(error);
        alert('Something went wrong');
      }
    }

    // ==========================================
    // Book Mentor
    // ==========================================
    async function bookMentor(mentorId) {
      try {
        const res = await fetch('/api/mentors/start-booking', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify({ mentorId })
        });

        const data = await res.json();

        if (!data.success) {
          alert(data.message);
          return;
        }

        window.location.href = data.redirectUrl;

      } catch (err) {
        console.error(err);
        alert('Failed to start booking');
      }
    }

  </script>
