<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor Chat - WinJob</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #a855f7;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --light-bg: #f5f5f5;
      --border-color: #e5e7eb;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --text-light: #9ca3af;
    }

    * {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: white;
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
    }

    /* Main Container */
    .chat-container {
      display: flex;
      height: 100vh;
      width: 100%;
      background: white;
    }

    /* LEFT SIDEBAR - CONTACTS */
    .contacts-sidebar {
      width: 320px;
      background: white;
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header h5 {
      margin: 0;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--text-primary);
    }

    .contacts-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .contact-item {
      padding: 12px 12px;
      margin: 0 8px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      gap: 12px;
      align-items: center;
      transition: all 0.2s ease;
      border: none;
      background: transparent;
      width: calc(100% - 16px);
      text-align: left;
    }

    .contact-item:hover {
      background: var(--light-bg);
    }

    .contact-item.active {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
      border-left: 3px solid var(--primary);
      padding-left: 9px;
    }

    .contact-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .contact-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .contact-name {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .contact-status {
      font-size: 0.8rem;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .online-badge {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      position: absolute;
      bottom: 0;
      right: 0;
    }

    /* RIGHT PANEL - CHAT */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
      position: relative;
    }

    .chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
    }

    .mentor-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .mentor-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .mentor-details h6 {
      margin: 0;
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    .mentor-status {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .chat-actions {
      display: flex;
      gap: 12px;
    }

    .action-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      cursor: pointer;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .action-btn:hover:not(:disabled) {
      background: var(--light-bg);
      border-color: var(--primary);
      color: var(--primary);
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* SESSION PANEL */
    .session-bar {
      padding: 12px 16px;
      background: #f0f9ff;
      border-bottom: 1px solid #bfdbfe;
      display: flex;
      justify-content: space-between;
      align-items: center;
      display: none;
    }

    .session-bar.visible {
      display: flex;
    }

    .session-info {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .timer-badge {
      background: var(--primary);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .timer-badge.expiring {
      background: var(--danger);
    }

    .btn-buy-time {
      background: var(--secondary);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .btn-buy-time:hover {
      transform: translateY(-1px);
    }

    /* MESSAGES */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      background: white;
    }

    .message-group {
      display: flex;
      margin-bottom: 8px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-bubble {
      max-width: 60%;
      padding: 10px 14px;
      border-radius: 12px;
      word-wrap: break-word;
    }

    .message-sent {
      margin-left: auto;
      background: var(--primary);
      color: white;
    }

    .message-received {
      margin-right: auto;
      background: var(--light-bg);
      color: var(--text-primary);
    }

    /* LOCK OVERLAY */
    .lock-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
      gap: 16px;
      z-index: 40;
      display: none;
    }

    .lock-overlay.active {
      display: flex;
    }

    .lock-icon {
      font-size: 3rem;
      color: var(--text-light);
    }

    .lock-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .lock-desc {
      color: var(--text-secondary);
      font-size: 0.95rem;
      max-width: 300px;
    }

    /* COMPOSER */
    .message-composer {
      padding: 12px 16px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .compose-input {
      flex: 1;
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: none;
      max-height: 100px;
      outline: none;
    }

    .compose-input:focus {
      border-color: var(--primary);
    }

    .compose-input:disabled {
      background: var(--light-bg);
      cursor: not-allowed;
    }

    .compose-actions {
      display: flex;
      gap: 8px;
    }

    .compose-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .compose-btn:hover:not(:disabled) {
      background: var(--light-bg);
      color: var(--primary);
    }

    .compose-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-send {
      background: var(--primary);
      color: white;
    }

    .btn-send:hover:not(:disabled) {
      background: var(--primary-dark);
    }

    /* EMPTY STATE */
    .empty-state {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      color: var(--text-light);
      text-align: center;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-title {
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .empty-text {
      font-size: 0.95rem;
      color: var(--text-light);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    /* Modal */
    .modal-content {
      border: none;
      border-radius: 12px;
    }

    @media (max-width: 768px) {
      .contacts-sidebar {
        width: 100%;
        position: absolute;
        height: 100%;
        left: 0;
        z-index: 50;
      }

      .contacts-sidebar.hidden {
        left: -100%;
      }

      .chat-main {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <!-- LEFT SIDEBAR -->
    <div class="contacts-sidebar" id="contactsSidebar">
      <div class="sidebar-header">
        <h5>Mentors</h5>
        <button class="btn-icon" id="backBtn" style="display: none; background: none; border: none; cursor: pointer;">
          <i class="fas fa-chevron-left"></i>
        </button>
      </div>
      <div class="contacts-list" id="contactsList">
        <div class="empty-state">
          <i class="fas fa-inbox empty-icon"></i>
          <div class="empty-title">No mentors yet</div>
          <div class="empty-text">Book a mentor to start chatting</div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="chat-main">
      <div class="empty-state" id="emptyChat">
        <i class="fas fa-comments empty-icon"></i>
        <div class="empty-title">Select a mentor to chat</div>
        <div class="empty-text">Choose from your booked mentors or book a new one</div>
      </div>

      <div id="chatView" style="display: none; flex: 1; display: flex; flex-direction: column;">
        <!-- CHAT HEADER -->
        <div class="chat-header">
          <button class="btn-icon" id="mobileBackBtn" style="display: none; background: none; border: none;">
            <i class="fas fa-arrow-left"></i>
          </button>
          <div class="mentor-info">
            <img id="mentorAvatar" src="" alt="Mentor" class="mentor-avatar">
            <div>
              <h6 id="mentorName"></h6>
              <div class="mentor-status" id="mentorStatus">Offline</div>
            </div>
          </div>
          <div class="chat-actions">
            <button class="action-btn" id="btnCall" title="Audio Call" disabled>
              <i class="fas fa-phone"></i>
            </button>
            <button class="action-btn" id="btnVideo" title="Video Call" disabled>
              <i class="fas fa-video"></i>
            </button>
          </div>
        </div>

        <!-- SESSION BAR -->
        <div class="session-bar" id="sessionBar">
          <div class="session-info">
            <i class="fas fa-hourglass-start" style="color: var(--primary);"></i>
            <span id="timerLabel">Session locked</span>
            <div class="timer-badge" id="timerBadge">00:00</div>
          </div>
          <button class="btn-buy-time" id="btnBuyTime">Buy 60 Minutes</button>
        </div>

        <!-- LOCK OVERLAY -->
        <div class="lock-overlay" id="lockOverlay">
          <div class="lock-icon">
            <i class="fas fa-lock"></i>
          </div>
          <div class="lock-title">Pay to start session</div>
          <div class="lock-desc">You need to complete payment to access chat, calls and file upload</div>
          <button class="btn-buy-time" id="btnPayNow">Buy 60 Minutes - 1 Hour</button>
        </div>

        <!-- MESSAGES -->
        <div class="messages-container" id="messagesContainer"></div>

        <!-- COMPOSER -->
        <div class="message-composer">
          <input type="text" class="compose-input" id="messageInput" placeholder="Type a message..." disabled>
          <div class="compose-actions">
            <button class="compose-btn" id="btnFile" title="Send File" disabled>
              <i class="fas fa-paperclip"></i>
            </button>
            <button class="compose-btn" id="btnVoice" title="Voice Note" disabled>
              <i class="fas fa-microphone"></i>
            </button>
            <button class="compose-btn btn-send" id="btnSend" title="Send" disabled>
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
          <input type="file" id="fileInput" style="display: none;">
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

  <script>
    // ======================================
    // MENTOR CHAT APP
    // ======================================

    class MentorChatApp {
      constructor() {
        this.socket = null;
        this.currentChat = null;
        this.currentBooking = null;
        this.currentMentor = null;
        this.contacts = [];
        this.messages = [];
        this.sessionTimer = null;
        this.init();
      }

      async init() {
        const token = localStorage.getItem('token') || this.getCookie('token');
        const userStr = localStorage.getItem('user');

        if (!token || !userStr) {
          window.location.href = 'login.html';
          return;
        }

        this.user = JSON.parse(userStr);
        this.initSocket();
        await this.loadContacts();
        this.setupEventListeners();
        this.autoSelectFromUrl();
      }

      initSocket() {
        this.socket = io({
          reconnection: true,
          reconnectionDelay: 1000,
          reconnectionAttempts: 5,
          transports: ['websocket', 'polling'],
          auth: {
            userId: this.user.id,
            token: localStorage.getItem('token') || this.getCookie('token')
          }
        });

        this.socket.on('connect', () => console.log('✅ Socket connected'));
        this.socket.on('disconnect', () => console.log('❌ Socket disconnected'));
        this.socket.on('receiveMessage', (data) => this.handleReceiveMessage(data));
        this.socket.on('userOnline', (data) => this.handleUserOnline(data));
        this.socket.on('userOffline', (data) => this.handleUserOffline(data));
      }

      async loadContacts() {
        try {
          const token = localStorage.getItem('token') || this.getCookie('token');
          const response = await fetch('/api/chat/list', {
            headers: { 'Authorization': `Bearer ${token}` }
          });

          if (!response.ok) throw new Error('Failed to load contacts');
          const data = await response.json();
          this.contacts = data.chats || [];
          this.renderContacts();
        } catch (error) {
          console.error('Load contacts error:', error);
        }
      }

      renderContacts() {
        const container = document.getElementById('contactsList');

        if (this.contacts.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-inbox empty-icon"></i>
              <div class="empty-title">No mentors booked</div>
              <div class="empty-text">Go to mentorships page to book a mentor</div>
            </div>
          `;
          return;
        }

        const html = this.contacts.map(contact => `
          <button class="contact-item ${this.currentChat?.roomId === contact.roomId ? 'active' : ''}" 
                  onclick="app.selectContact(${contact.roomId}, '${contact.mentorId}', ${contact.bookingId})">
            <div style="position: relative;">
              <img src="${contact.mentorAvatar || 'https://via.placeholder.com/48'}" alt="Mentor" class="contact-avatar">
            </div>
            <div class="contact-info">
              <div class="contact-name">${this.escapeHtml(contact.mentorName)}</div>
              <div class="contact-status">${this.getPreview(contact.lastMessage)}</div>
            </div>
          </button>
        `).join('');

        container.innerHTML = html;
      }

      selectContact(roomId, mentorId, bookingId) {
        const contact = this.contacts.find(c => c.roomId == Number(roomId));
        if (!contact) return;

        this.currentChat = { roomId: Number(roomId), mentorId, bookingId: Number(bookingId) };
        this.currentMentor = {
          id: mentorId,
          full_name: contact.mentorName,
          profile_image_url: contact.mentorAvatar
        };

        this.renderContacts();
        this.loadChatUI();
      }

      async loadChatUI() {
        document.getElementById('emptyChat').style.display = 'none';
        document.getElementById('chatView').style.display = 'flex';

        document.getElementById('mentorName').textContent = this.currentMentor.full_name;
        document.getElementById('mentorAvatar').src = this.currentMentor.profile_image_url || 'https://via.placeholder.com/40';

        await this.loadBookingDetails();
        await this.loadMessages();

        this.socket.emit('joinChatRoom', {
          roomId: this.currentChat.roomId,
          bookingId: this.currentChat.bookingId
        });

        this.updateSessionState();
        this.hideMobileSidebar();
      }

      async loadBookingDetails() {
        try {
          const token = localStorage.getItem('token') || this.getCookie('token');
          const response = await fetch(`/api/mentors/booking/${this.currentChat.bookingId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });

          if (!response.ok) throw new Error('Failed to load booking');
          const data = await response.json();
          this.currentBooking = data.booking;
        } catch (error) {
          console.error('Load booking error:', error);
        }
      }

      async loadMessages() {
        try {
          const token = localStorage.getItem('token') || this.getCookie('token');
          const response = await fetch(`/api/chat/messages/${this.currentChat.roomId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });

          if (!response.ok) throw new Error('Failed to load messages');
          const data = await response.json();
          this.messages = data.messages || [];
          this.renderMessages();
        } catch (error) {
          console.error('Load messages error:', error);
        }
      }

      renderMessages() {
        const container = document.getElementById('messagesContainer');
        let html = '';

        this.messages.forEach(msg => {
          const isSent = msg.sender_id === this.user.id;
          const content = msg.encrypted_message;

          html += `
            <div class="message-group ${isSent ? 'sent' : 'received'}">
              <div class="message-bubble ${isSent ? 'message-sent' : 'message-received'}">
                ${this.escapeHtml(content)}
              </div>
            </div>
          `;
        });

        container.innerHTML = html || '<div class="empty-state" style="margin: auto;"><i class="fas fa-comments" style="font-size: 2rem; opacity: 0.2;"></i></div>';
        container.scrollTop = container.scrollHeight;
      }

      async sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();

        if (!text || !this.currentBooking || this.currentBooking.remainingSeconds <= 0) {
          alert('Session inactive. Buy time to continue.');
          return;
        }

        try {
          const token = localStorage.getItem('token') || this.getCookie('token');
          const response = await fetch('/api/chat/send', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              roomId: this.currentChat.roomId,
              message: text,
              messageType: 'text'
            })
          });

          if (response.ok) {
            input.value = '';
            input.style.height = 'auto';
            const msgData = {
              sender_id: this.user.id,
              encrypted_message: text,
              sender_type: 'user',
              created_at: new Date().toISOString()
            };
            this.messages.push(msgData);
            this.renderMessages();

            // Emit via Socket.IO for real-time update to mentor
            if (this.socket && this.socket.connected) {
              this.socket.emit('sendMessage', {
                roomId: this.currentChat.roomId,
                bookingId: this.currentChat.bookingId,
                message: text,
                messageType: 'text',
                senderId: this.user.id,
                senderType: 'user',
                timestamp: new Date().toISOString()
              });
            }
          }
        } catch (error) {
          console.error('Send message error:', error);
          alert('Failed to send message');
        }
      }

      updateSessionState() {
        if (!this.currentBooking) return;

        const isActive = this.currentBooking.paymentStatus === 'paid' && this.currentBooking.remainingSeconds > 0;
        const sessionBar = document.getElementById('sessionBar' );
        const lockOverlay = document.getElementById('lockOverlay');
        const messageInput = document.getElementById('messageInput');
        const btnSend = document.getElementById('btnSend');
        const btnFile = document.getElementById('btnFile');
        const btnVoice = document.getElementById('btnVoice');
        const btnCall = document.getElementById('btnCall');
        const btnVideo = document.getElementById('btnVideo');
        const timerBadge = document.getElementById('timerBadge');

        if (isActive) {
          sessionBar.classList.add('visible');
          lockOverlay.classList.remove('active');
          messageInput.disabled = false;
          btnSend.disabled = false;
          btnFile.disabled = false;
          btnVoice.disabled = false;
          btnCall.disabled = false;
          btnVideo.disabled = false;

          this.startSessionTimer();
          this.updateTimer();
        } else {
          sessionBar.classList.remove('visible');
          lockOverlay.classList.add('active');
          messageInput.disabled = true;
          btnSend.disabled = true;
          btnFile.disabled = true;
          btnVoice.disabled = true;
          btnCall.disabled = true;
          btnVideo.disabled = true;

          timerBadge.textContent = '00:00';
          this.stopSessionTimer();
        }
      }

      startSessionTimer() {
        this.stopSessionTimer();
        this.sessionTimer = setInterval(() => {
          if (!this.currentBooking) return;

          this.currentBooking.remainingSeconds -= 1;

          if (this.currentBooking.remainingSeconds <= 0) {
            this.updateSessionState();
            alert('Session expired. Buy more time to continue.');
          } else {
            this.updateTimer();
          }
        }, 1000);
      }

      stopSessionTimer() {
        if (this.sessionTimer) {
          clearInterval(this.sessionTimer);
          this.sessionTimer = null;
        }
      }

      updateTimer() {
        const mins = Math.floor(this.currentBooking.remainingSeconds / 60);
        const secs = this.currentBooking.remainingSeconds % 60;
        const timeStr = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        document.getElementById('timerBadge').textContent = timeStr;

        if (this.currentBooking.remainingSeconds <= 300) {
          document.getElementById('timerBadge').classList.add('expiring');
        } else {
          document.getElementById('timerBadge').classList.remove('expiring');
        }
      }

      async handlePayment() {
        if (!this.currentMentor || !this.currentBooking) return;

        const amount = this.currentBooking.hourlyPrice || 0;
        if (!amount) {
          alert('Invalid mentor price');
          return;
        }

        try {
          const orderRes = await fetch('/api/mentors/create-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ mentorId: this.currentMentor.id, amount })
          });

          const orderData = await orderRes.json();

          const options = {
            key: 'rzp_test_SYW8QFaHP8GPNq',
            amount: orderData.amount,
            currency: 'INR',
            name: 'WINJOB Mentorship',
            description: `1-hour session with ${this.currentMentor.full_name}`,
            order_id: orderData.orderId,
            handler: async (response) => {
              const verifyRes = await fetch('/api/mentors/payment-success', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                  mentorId: this.currentMentor.id,
                  amount,
                  bookingId: this.currentBooking.id,
                  razorpay_order_id: response.razorpay_order_id,
                  razorpay_payment_id: response.razorpay_payment_id
                })
              });

              const result = await verifyRes.json();
              if (result.success) {
                await this.loadBookingDetails();
                this.updateSessionState();
              }
            },
            theme: { color: '#6366f1' }
          };

          const rzp = new Razorpay(options);
          rzp.open();
        } catch (error) {
          console.error('Payment error:', error);
          alert('Payment failed');
        }
      }

      setupEventListeners() {
        document.getElementById('btnSend').addEventListener('click', () => this.sendMessage());
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            this.sendMessage();
          }
        });

        document.getElementById('btnBuyTime').addEventListener('click', () => this.handlePayment());
        document.getElementById('btnPayNow').addEventListener('click', () => this.handlePayment());

        document.getElementById('mobileBackBtn').addEventListener('click', () => this.showMobileSidebar());
        document.getElementById('backBtn').addEventListener('click', () => this.hideAllChats());
      }

      autoSelectFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const bookingId = params.get('bookingId');
        const mentorId = params.get('mentorId');
        const roomId = params.get('roomId');

        if (roomId && mentorId && bookingId) {
          const contact = this.contacts.find(c => c.roomId == roomId);
          if (contact) {
            setTimeout(() => this.selectContact(roomId, mentorId, bookingId), 100);
          }
        }
      }

      handleReceiveMessage(data) {
        if (Number(data.roomId) !== Number(this.currentChat?.roomId)) return;

        this.messages.push(data);
        this.renderMessages();
      }

      handleUserOnline(data) {
        document.getElementById('mentorStatus').textContent = 'Online';
      }

      handleUserOffline(data) {
        document.getElementById('mentorStatus').textContent = 'Offline';
      }

      getPreview(text) {
        if (!text) return 'No messages';
        return text.substring(0, 30) + (text.length > 30 ? '...' : '');
      }

      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      getCookie(name) {
        const nameEQ = name + "=";
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
          cookie = cookie.trim();
          if (cookie.startsWith(nameEQ)) {
            return decodeURIComponent(cookie.substring(nameEQ.length));
          }
        }
        return null;
      }

      showMobileSidebar() {
        document.getElementById('mobileBackBtn').style.display = 'none';
        document.getElementById('contactsSidebar').classList.remove('hidden');
      }

      hideMobileSidebar() {
        if (window.innerWidth <= 768) {
          document.getElementById('mobileBackBtn').style.display = 'flex';
          document.getElementById('contactsSidebar').classList.add('hidden');
        }
      }

      hideAllChats() {
        document.getElementById('chatView').style.display = 'none';
        document.getElementById('emptyChat').style.display = 'flex';
        document.getElementById('contactsSidebar').classList.remove('hidden');
        document.getElementById('mobileBackBtn').style.display = 'none';
        this.currentChat = null;
        this.stopSessionTimer();
      }
    }

    // Initialize
    let app;
    document.addEventListener('DOMContentLoaded', () => {
      app = new MentorChatApp();
    });
  </script>
</body>
</html>
