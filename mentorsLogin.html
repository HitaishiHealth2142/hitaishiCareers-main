<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor Login - WinJob</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #a855f7;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    * {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Animated background elements */
    body::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      top: -100px;
      left: -100px;
      animation: float 8s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      bottom: -50px;
      right: -50px;
      animation: float 6s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(30px);
      }
    }

    .login-container {
      max-width: 450px;
      width: 100%;
      position: relative;
      z-index: 10;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      padding: 50px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .login-header::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.1;
    }

    .login-header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .login-header p {
      font-size: 0.95rem;
      opacity: 0.95;
      margin: 0;
      position: relative;
      z-index: 1;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 1.8rem;
      backdrop-filter: blur(10px);
    }

    .login-body {
      padding: 40px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 10px;
      font-size: 0.95rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .form-control {
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      background: #f9fafb;
    }

    .form-control:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-control.error {
      border-color: var(--danger);
      background: #fef2f2;
    }

    .forgot-password {
      color: var(--primary);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .forgot-password:hover {
      color: var(--secondary);
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--primary);
    }

    .remember-me label {
      margin: 0;
      cursor: pointer;
      color: #6b7280;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .error-message {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 8px;
      display: none;
      padding: 10px 12px;
      background: #fef2f2;
      border-radius: 8px;
      border-left: 3px solid var(--danger);
    }

    .error-message.show {
      display: block;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .loading-spinner {
      display: none;
      width: 16px;
      height: 16px;
    }

    .divider {
      margin: 24px 0;
      text-align: center;
      color: #d1d5db;
      font-size: 0.9rem;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: #e5e7eb;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .signup-link {
      text-align: center;
      margin-top: 24px;
      color: #6b7280;
      font-size: 0.95rem;
    }

    .signup-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .signup-link a:hover {
      color: var(--secondary);
    }

    .success-message {
      background: #d1fae5;
      color: #065f46;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
      border-left: 3px solid var(--success);
    }

    .success-message.show {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Alert styling */
    .alert-banner {
      background: #fef3c7;
      color: #92400e;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 3px solid var(--warning);
      display: none;
    }

    .alert-banner.show {
      display: flex;
    }

    @media (max-width: 480px) {
      .login-card {
        border-radius: 15px;
      }

      .login-body {
        padding: 30px 20px;
      }

      .login-header {
        padding: 40px 20px;
      }

      .login-header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-icon">
          <i class="fas fa-user-tie"></i>
        </div>
        <h1>Mentor Login</h1>
        <p>Access your mentoring dashboard</p>
      </div>

      <div class="login-body">
        <div class="alert-banner" id="alertBanner">
          <i class="fas fa-info-circle"></i>
          <span id="alertMessage"></span>
        </div>

        <div class="success-message" id="successMessage">
          <i class="fas fa-check-circle"></i>
          <span>Login successful! Redirecting...</span>
        </div>

        <form id="mentorLoginForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input 
              type="email" 
              class="form-control" 
              id="email" 
              placeholder="your@email.com" 
              required
              autocomplete="email"
            >
            <div class="error-message" id="emailError"></div>
          </div>

          <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label class="form-label" style="margin-bottom: 0;">Password</label>
              <a href="#" class="forgot-password">Forgot password?</a>
            </div>
            <input 
              type="password" 
              class="form-control" 
              id="password" 
              placeholder="••••••••" 
              required
              autocomplete="current-password"
            >
            <div class="error-message" id="passwordError"></div>
          </div>

          <div class="remember-me">
            <input type="checkbox" id="rememberMe" name="rememberMe">
            <label for="rememberMe">Keep me logged in</label>
          </div>

          <button type="submit" class="login-btn" id="loginBtn">
            <span class="loading-spinner" id="loadingSpinner">
              <i class="fas fa-spinner fa-spin"></i>
            </span>
            <span>Sign In</span>
          </button>
        </form>

        <div class="divider">OR</div>

        <div class="signup-link">
          New to mentoring? <a href="mentor-register.html">Create an account</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
  <script>
    // ==========================================
    // Form Validation
    // ==========================================
    function clearErrors() {
      document.querySelectorAll('.form-control').forEach(el => {
        el.classList.remove('error');
      });
      document.querySelectorAll('.error-message').forEach(el => {
        el.classList.remove('show');
      });
    }

    function showError(fieldId, message) {
      const field = document.getElementById(fieldId);
      const errorEl = document.getElementById(fieldId + 'Error');
      if (field) field.classList.add('error');
      if (errorEl) {
        errorEl.textContent = message;
        errorEl.classList.add('show');
      }
    }

    function validateForm() {
      clearErrors();
      let isValid = true;

      const email = document.getElementById('email').value.trim();
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email || !emailRegex.test(email)) {
        showError('email', 'Valid email is required');
        isValid = false;
      }

      const password = document.getElementById('password').value;
      if (!password) {
        showError('password', 'Password is required');
        isValid = false;
      }

      return isValid;
    }

    // ==========================================
    // Form Submission
    // ==========================================
    document.getElementById('mentorLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!validateForm()) {
        return;
      }

      const loginBtn = document.getElementById('loginBtn');
      const loadingSpinner = document.getElementById('loadingSpinner');

      loginBtn.disabled = true;
      loadingSpinner.style.display = 'inline-block';

      try {
        const response = await fetch('/api/mentor/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            rememberMe: document.getElementById('rememberMe').checked,
          }),
        });

        const data = await response.json();

        if (data.success) {
          // Store token in localStorage for mobile/API usage
          if (data.token) {
            localStorage.setItem('mentorToken', data.token);
            localStorage.setItem('mentor', JSON.stringify(data.mentor));
          }

          document.getElementById('successMessage').classList.add('show');
          setTimeout(() => {
            window.location.href = 'mentor-dashboard.html';
          }, 1500);
        } else {
          showError('email', data.message || 'Login failed');
          loginBtn.disabled = false;
          loadingSpinner.style.display = 'none';
        }
      } catch (error) {
        console.error('Login error:', error);
        showError('email', 'An error occurred. Please try again.');
        loginBtn.disabled = false;
        loadingSpinner.style.display = 'none';
      }
    });

    // Check if redirected from another page
    const params = new URLSearchParams(window.location.search);
    if (params.get('registered') === 'true') {
      const alertBanner = document.getElementById('alertBanner');
      const alertMessage = document.getElementById('alertMessage');
      alertMessage.textContent = 'Registration successful! Please login with your credentials.';
      alertBanner.classList.add('show');
    }
  </script>
</body>
</html>
