<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinJob Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #5B9BFF;
            --secondary-color: #8B5CF6;
            --success-color: #4caf50;
            --danger-color: #f44336;
            --warning-color: #ff9800;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-dark: #333;
            --text-light: #666;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
        }

        /* ========== LOGIN PAGE ========== */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: var(--primary-color);
            text-align: center;
        }

        .login-box p {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(91, 155, 255, 0.3);
        }

        .otp-step {
            display: none;
        }

        .otp-step.active {
            display: block;
        }

        .otp-input-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .otp-input-group input {
            width: 50px;
            height: 50px;
            font-size: 24px;
            text-align: center;
            padding: 0;
            border: 2px solid var(--border-color);
            border-radius: 8px;
        }

        .otp-input-group input:focus {
            border-color: var(--primary-color);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(91, 155, 255, 0.4);
        }

        .btn-secondary {
            background: #f0f4ff;
            color: var(--primary-color);
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #e6ecff;
        }

        .timer {
            text-align: center;
            color: var(--warning-color);
            font-weight: 600;
            margin-bottom: 20px;
        }

        .error-message {
            background: #ffebee;
            color: var(--danger-color);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* ========== DASHBOARD LAYOUT ========== */
        .dashboard-container {
            display: none;
            min-height: 100vh;
            background-color: var(--bg-color);
        }

        .dashboard-container.active {
            display: flex;
        }

        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 30px 0;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 0 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            opacity: 0.8;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            padding: 0;
        }

        .sidebar-menu button {
            width: 100%;
            padding: 15px 20px;
            background: none;
            border: none;
            color: white;
            text-align: left;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .sidebar-menu button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-left-color: white;
        }

        .sidebar-menu button.active {
            background: rgba(255, 255, 255, 0.2);
            border-left-color: white;
            font-weight: 600;
        }

        .sidebar-footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar-footer button {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .sidebar-footer button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--text-dark);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filters input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            transform: translateY(-4px);
        }

        .card-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
        }

        .card-body {
            padding: 20px;
        }

        .card-body.hidden {
            display: none;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .card-subtitle {
            font-size: 12px;
            opacity: 0.9;
        }

        .detail-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .detail-label {
            font-size: 12px;
            color: var(--text-light);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 14px;
            color: var(--text-dark);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-verified {
            background: #e8f5e9;
            color: var(--success-color);
        }

        .badge-pending {
            background: #fff3e0;
            color: var(--warning-color);
        }

        .badge-active {
            background: #e3f2fd;
            color: var(--primary-color);
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-small {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-approve {
            background: var(--success-color);
            color: white;
        }

        .btn-approve:hover {
            background: #45a049;
        }

        .btn-reject {
            background: var(--danger-color);
            color: white;
        }

        .btn-reject:hover {
            background: #da190b;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 16px;
            color: var(--text-light);
        }

        .spinner {
            border: 4px solid var(--bg-color);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .cards-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                padding: 15px 0;
                display: flex;
                justify-content: space-between;
            }

            .sidebar-menu {
                display: flex;
                width: 100%;
            }

            .sidebar-menu li {
                flex: 1;
            }

            .sidebar-menu button {
                padding: 10px;
                font-size: 12px;
            }

            .sidebar-footer {
                position: static;
                border: none;
                padding: 0 10px;
            }

            .stat-card .number {
                font-size: 24px;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- LOGIN PAGE -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>🔐 WinJob Admin</h1>
            <p>Portal Administration System</p>

            <div class="error-message" id="errorMessage"></div>

            <!-- Step 1: Email & Password -->
            <div id="credentialsStep" class="otp-step active">
                <div class="form-group">
                    <label>📧 Admin Email</label>
                    <input type="email" id="adminEmail" placeholder="admin@example.com" required>
                </div>

                <div class="form-group">
                    <label>🔑 Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter your password" required>
                </div>

                <button class="btn btn-primary" onclick="requestOTP()">Request OTP</button>
            </div>

            <!-- Step 2: OTP Verification -->
            <div id="otpStep" class="otp-step">
                <p style="text-align: center; color: var(--text-light); margin-bottom: 20px;">
                    OTP sent to your email
                </p>

                <div class="timer" id="otpTimer"></div>

                <div class="otp-input-group" id="otpInputGroup">
                    <input type="text" maxlength="1" class="otp-input" placeholder="0">
                    <input type="text" maxlength="1" class="otp-input" placeholder="0">
                    <input type="text" maxlength="1" class="otp-input" placeholder="0">
                    <input type="text" maxlength="1" class="otp-input" placeholder="0">
                    <input type="text" maxlength="1" class="otp-input" placeholder="0">
                    <input type="text" maxlength="1" class="otp-input" placeholder="0">
                </div>

                <button class="btn btn-primary" onclick="verifyOTP()">Verify OTP</button>
                <button class="btn btn-secondary" onclick="goBackToCredentials()">Go Back</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard-container" id="dashboardContainer">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🎯 WinJob</h2>
                <p>Admin Dashboard</p>
            </div>

            <ul class="sidebar-menu">
                <li><button onclick="switchSection('dashboard')" class="menu-btn active">📊 Dashboard</button></li>
                <li><button onclick="switchSection('users')" class="menu-btn">👥 Users</button></li>
                <li><button onclick="switchSection('companies')" class="menu-btn">🏢 Companies</button></li>
                <li><button onclick="switchSection('jobs')" class="menu-btn">💼 Jobs</button></li>
                <li><button onclick="switchSection('mentors')" class="menu-btn">👨‍🏫 Mentors</button></li>
            </ul>

            <div class="sidebar-footer">
                <button onclick="logout()" style="color: #ff0000;">🚪 Logout</button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- DASHBOARD SECTION -->
            <section class="content-section active" id="dashboardSection">
                <h2 class="section-title">📊 Dashboard Statistics</h2>
                <div class="stats-container" id="statsContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading statistics...
                    </div>
                </div>
            </section>

            <!-- USERS SECTION -->
            <section class="content-section" id="usersSection">
                <h2 class="section-title">👥 Candidates</h2>
                <div class="filters">
                    <input type="text" id="usersFilter" placeholder="Search by name, email...">
                </div>
                <div class="cards-grid" id="usersContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading candidates...
                    </div>
                </div>
            </section>

            <!-- COMPANIES SECTION -->
            <section class="content-section" id="companiesSection">
                <h2 class="section-title">🏢 Companies</h2>
                <div class="filters">
                    <input type="text" id="companiesFilter" placeholder="Search by company name...">
                </div>
                <div class="cards-grid" id="companiesContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading companies...
                    </div>
                </div>
            </section>

            <!-- JOBS SECTION -->
            <section class="content-section" id="jobsSection">
                <h2 class="section-title">💼 Jobs</h2>
                <div class="filters">
                    <input type="text" id="jobsFilter" placeholder="Search by job title...">
                </div>
                <div class="cards-grid" id="jobsContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading jobs...
                    </div>
                </div>
            </section>

            <!-- MENTORS SECTION -->
            <section class="content-section" id="mentorsSection">
                <h2 class="section-title">👨‍🏫 Mentors</h2>
                <div class="filters">
                    <input type="text" id="mentorsFilter" placeholder="Search by mentor name...">
                </div>
                <div class="cards-grid" id="mentorsContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading mentors...
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const BASE_URL = 'https://winjob.in/api';
        let currentAdminId = null;
        let currentToken = null;
        let otpTimer = null;

        // ===== LOGIN FUNCTIONS =====
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        async function requestOTP() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;

            if (!email || !password) {
                showError('Please enter email and password');
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/admin/request-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Failed to request OTP');
                    return;
                }

                currentAdminId = data.adminId;
                document.getElementById('credentialsStep').classList.remove('active');
                document.getElementById('otpStep').classList.add('active');
                startOTPTimer();
                focusOTPInput();
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }

        function startOTPTimer() {
            let timeLeft = 30;
            const timerDiv = document.getElementById('otpTimer');

            otpTimer = setInterval(() => {
                timeLeft--;
                timerDiv.textContent = `⏱️ OTP expires in ${timeLeft}s`;

                if (timeLeft <= 0) {
                    clearInterval(otpTimer);
                    showError('OTP expired. Please request a new one.');
                    goBackToCredentials();
                }
            }, 1000);

            timerDiv.textContent = `⏱️ OTP expires in ${timeLeft}s`;
        }

        function focusOTPInput() {
            document.querySelectorAll('.otp-input')[0].focus();
        }

        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('otp-input')) {
                if (e.target.value.length === 1) {
                    const next = e.target.nextElementSibling;
                    if (next && next.classList.contains('otp-input')) {
                        next.focus();
                    }
                }
            }
        });

        function getOTPValue() {
            return Array.from(document.querySelectorAll('.otp-input'))
                .map(input => input.value)
                .join('');
        }

        async function verifyOTP() {
            const otp = getOTPValue();

            if (otp.length !== 6) {
                showError('Please enter complete 6-digit OTP');
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/admin/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminId: currentAdminId, otp })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'OTP verification failed');
                    return;
                }

                currentToken = data.token;
                localStorage.setItem('adminToken', currentToken);
                clearInterval(otpTimer);
                loginSuccess();
            } catch (error) {
                showError('Network error: ' + error.message);
            }
        }

        function goBackToCredentials() {
            clearInterval(otpTimer);
            document.getElementById('otpStep').classList.remove('active');
            document.getElementById('credentialsStep').classList.add('active');
            document.querySelectorAll('.otp-input').forEach(input => input.value = '');
        }

        function loginSuccess() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboardContainer').classList.add('active');
            loadDashboardData();
        }

        // ===== DASHBOARD FUNCTIONS =====
        function switchSection(sectionId) {
            // Hide all sections
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
            });

            // Remove active class from all menu buttons
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected section
            document.getElementById(sectionId + 'Section').classList.add('active');
            event.target.classList.add('active');

            // Load data based on section
            if (sectionId === 'users') loadUsers();
            if (sectionId === 'companies') loadCompanies();
            if (sectionId === 'jobs') loadJobs();
            if (sectionId === 'mentors') loadMentors();
        }

        async function loadDashboardData() {
            try {
                const response = await fetch(`${BASE_URL}/admin/dashboard/stats`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error);

                const stats = data.stats;
                document.getElementById('statsContainer').innerHTML = `
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <div class="number">${stats.totalUsers}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Companies</h3>
                        <div class="number">${stats.totalCompanies}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Active Jobs</h3>
                        <div class="number">${stats.activeJobs}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Mentors</h3>
                        <div class="number">${stats.totalMentors}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Approved Mentors</h3>
                        <div class="number">${stats.approvedMentors}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Pending Mentors</h3>
                        <div class="number">${stats.pendingMentors}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Applications</h3>
                        <div class="number">${stats.totalApplications}</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadUsers() {
            try {
                const response = await fetch(`${BASE_URL}/admin/dashboard/all-users`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error);

                const container = document.getElementById('usersContainer');
                container.innerHTML = data.users.map(user => `
                    <div class="card" onclick="expandCard(this)">
                        <div class="card-header">
                            <div class="card-title">${user.full_name}</div>
                            <div class="card-subtitle">${user.email}</div>
                        </div>
                        <div class="card-body hidden">
                            <div class="detail-item">
                                <div class="detail-label">Username</div>
                                <div class="detail-value">${user.full_name}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Email</div>
                                <div class="detail-value">${user.email}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Phone</div>
                                <div class="detail-value">${user.mobile_number || 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Gender</div>
                                <div class="detail-value">${user.gender || 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Experience Level</div>
                                <div class="detail-value">${user.experience_level || 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Joined</div>
                                <div class="detail-value">${new Date(user.created_at).toLocaleDateString()}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        async function loadCompanies() {
            try {
                const response = await fetch(`${BASE_URL}/admin/dashboard/all-companies`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error);

                const container = document.getElementById('companiesContainer');
                container.innerHTML = data.companies.map(company => `
                    <div class="card" onclick="expandCard(this)">
                        <div class="card-header">
                            <div class="card-title">${company.company_name}</div>
                            <div class="card-subtitle">${company.user_email}</div>
                        </div>
                        <div class="card-body hidden">
                            <div class="detail-item">
                                <div class="detail-label">Company Name</div>
                                <div class="detail-value">${company.company_name}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Email</div>
                                <div class="detail-value">${company.user_email}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Contact Person</div>
                                <div class="detail-value">${company.contact_person || 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Phone</div>
                                <div class="detail-value">${company.contact_phone || 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Website</div>
                                <div class="detail-value"><a href="${company.website}" target="_blank">${company.website || 'N/A'}</a></div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Address</div>
                                <div class="detail-value">${company.address || 'N/A'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Registered</div>
                                <div class="detail-value">${new Date(company.created_at).toLocaleDateString()}</div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading companies:', error);
            }
        }

        async function loadJobs() {
            try {
                const response = await fetch(`${BASE_URL}/admin/dashboard/all-jobs`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error);

                const container = document.getElementById('jobsContainer');
                container.innerHTML = data.jobs.map(job => `
                    <div class="card" onclick="expandCard(this)">
                        <div class="card-header">
                            <div class="card-title">${job.job_title}</div>
                            <div class="card-subtitle">${job.company_name}</div>
                        </div>
                        <div class="card-body hidden">
                            <div class="detail-item">
                                <div class="detail-label">Job Title</div>
                                <div class="detail-value">${job.job_title}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Company</div>
                                <div class="detail-value">${job.company_name}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Experience</div>
                                <div class="detail-value">${job.required_experience || 'N/A'}</div>

                            <div class="detail-item">

                                <div class="detail-value">${job.city}, ${job.state}, ${job.country}</div>

                            <div class="detail-item">

                            </div>

                                <div class="detail-label">Status</div>
                                <div class="detail-value">${job.status}</div>
                            </div>
                            <div class="detail-item">

        async function loadMentors() {
            try {
                const response = await fetch(`${BASE_URL}/admin/dashboard/all-mentors`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error);

                const container = document.getElementById('mentorsContainer');
                container.innerHTML = data.mentors.map(mentor => `
                    <div class="card" onclick="expandCard(this)">
                        <div class="card-header">
                            <div class="card-title">${mentor.full_name}</div>
                            <div class="card-subtitle">
                                <span class="badge ${mentor.is_verified ? 'badge-verified' : 'badge-pending'}">
                                    ${mentor.is_verified ? '✓ Approved' : '⏳ Pending'}
                                </span>
                            </div>
                        </div>
                        <div class="card-body hidden">
                            <div class="detail-item">
                                <div class="detail-label">Name</div>
                                <div class="detail-value">${mentor.full_name}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Email</div>
                                <div class="detail-value">${mentor.email}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Title</div>
                                <div class="detail-value">${mentor.title}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Company</div>
                                <div class="detail-value">${mentor.current_company}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Experience</div>
                                <div class="detail-value">${mentor.experience_years} years</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Rating</div>
                                <div class="detail-value">⭐ ${mentor.rating}/5 (${mentor.total_sessions} sessions)</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Hourly Rate</div>
                                <div class="detail-value">₹${mentor.hourly_price}/hour</div>
                            </div>
                            <div class="card-actions">
                                <button class="btn-small btn-approve" onclick="approveMentor('${mentor.id}')">Approve</button>
                                <button class="btn-small btn-reject" onclick="rejectMentor('${mentor.id}')">Reject</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading mentors:', error);
            }
        }

        function expandCard(element) {
            const cardBody = element.querySelector('.card-body');
            cardBody.classList.toggle('hidden');
        }

        async function approveMentor(mentorId) {
            try {
                const response = await fetch(`${BASE_URL}/admin/dashboard/mentor/${mentorId}/approve`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error);

                alert('✓ Mentor approved successfully!');
                loadMentors();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function rejectMentor(mentorId) {
            try {
                const response = await fetch(`${BASE_URL}/admin/dashboard/mentor/${mentorId}/reject`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error);

                alert('✓ Mentor rejected successfully!');
                loadMentors();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function logout() {
            try {
                await fetch(`${BASE_URL}/admin/logout`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });

                localStorage.removeItem('adminToken');
                currentToken = null;
                document.getElementById('dashboardContainer').classList.remove('active');
                document.getElementById('loginContainer').style.display = 'flex';
                document.getElementById('credentialsStep').classList.add('active');
                document.getElementById('otpStep').classList.remove('active');
                document.querySelectorAll('.otp-input').forEach(input => input.value = '');
                document.getElementById('adminEmail').value = '';
                document.getElementById('adminPassword').value = '';
            } catch (error) {
                console.error('Logout error:', error);
            }
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            const token = localStorage.getItem('adminToken');
            if (token) {
                currentToken = token;
                loginSuccess();
            }
        });
    </script>
</body>
</html>
